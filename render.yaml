services:
  - type: web
    name: gandoura-store-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: ./start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gandoura-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
    autoDeploy: true

databases:
  - name: gandoura-db
    region: frankfurt
    plan: free
    databaseName: gandoura
    ipAllowList: []
