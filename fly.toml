app = "gandoura-store-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=512"
  STORE_CORS = "http://localhost:3000,https://al-qamis.vercel.app"
  ADMIN_CORS = "http://localhost:5173,http://localhost:9000,https://al-qamis.vercel.app"
  AUTH_CORS = "http://localhost:5173,http://localhost:9000,http://localhost:3000,https://al-qamis.vercel.app"
  MEDUSA_ADMIN_ONBOARDING_TYPE = "default"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
